name: Build Android APK from ZIP

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project payload
        run: |
          rm -rf extracted
          unzip -q pythair_payload_fixed.zip -d extracted
          shopt -s dotglob
          cp -r extracted/PythAIRStudio_fixed/* .
          rm -rf extracted

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PythAIRStudio-debug-apk
          path: app/build/outputs/apk/debug/*.apk
